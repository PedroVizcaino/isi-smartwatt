services:
  # Backend Flask
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    network_mode: host
    environment:
      - SECRET_KEY=smartwatt-dev-2026
      - MYSQL_HOST=127.0.0.1
      - MYSQL_PORT=3307
      - MYSQL_USER=smartwatt_user
      - MYSQL_PASSWORD=SmartWatt2026!
      - MYSQL_DATABASE=smartwatt_db
      - OLLAMA_HOST=http://127.0.0.1:11435
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
    restart: on-failure

  # Frontend Nginx (Servidor Web)
  frontend:
    image: nginx:alpine
    network_mode: host
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf

  # Base de Datos MySQL
  db:
    image: mysql:8.0
    container_name: smartwatt-db
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=smartwatt_db
      - MYSQL_USER=smartwatt_user
      - MYSQL_PASSWORD=SmartWatt2026!
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./schema_mysql.sql:/docker-entrypoint-initdb.d/schema_mysql.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # IA Ollama
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    network_mode: host
    environment:
      - OLLAMA_HOST=0.0.0.0:11435
      - OLLAMA_SSL_SKIP_VERIFY=true
    volumes:
      - ollama-data:/root/.ollama
      - /etc/ssl/certs:/etc/ssl/certs:ro

  # Descarga automática del modelo
  ollama-pull-model:
    image: ollama/ollama:latest
    network_mode: host
    environment:
      - OLLAMA_HOST=127.0.0.1:11435
      - OLLAMA_SSL_SKIP_VERIFY=true
    volumes:
      - ollama-data:/root/.ollama
      - /etc/ssl/certs:/etc/ssl/certs:ro
    entrypoint: [ "/bin/sh", "-c" ]
    command: "sleep 10 && ollama pull gemma2:2b"
    depends_on:
      - ollama

volumes:
  mysql-data:
  ollama-data:
